<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- 
      This is an HTML comment
      You can write text in a comment and the content won't be visible in the page
    -->

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!--
      This is the page head - it contains info the browser uses
      Like the title, which appears on the browser tab but not inside the page
      Further down you'll see the content that displays in the page
    -->
    <title>E-CHESS</title>

    <!-- The website stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script type="module">
        import { playhtml } from 'https://unpkg.com/playhtml';

        playhtml.init({
          cursors: {
            enabled: true,
          },
        });

        const audio = new Audio("dingeffect.mp3");
        const buttons = document.querySelectorAll("button");

        buttons.forEach(button => {
          button.addEventListener("click", () => {
            audio.play();
          });
        });
    </script>

    <header class="title">Chess in the Park!</header>

    <div id="wrapper">
      <div id="menu">
        <button alt="turn button" id="tb" class="turnbutton" can-toggle></button>
        <header id="chatboxtitle">Your opponent says:</header>
        <input type="text" id="chatbox" can-mirror>
      </div>

      <div alt="chess board" id="chessboard">
        <img src="images/pieces/blackbishop.png" can-move class="piece" id="bb1">
        <img src="images/pieces/whitebishop.png" can-move class="piece" id="wb1">
        <img src="images/pieces/blackrook.png" can-move class="piece" id="br1">
        <img src="images/pieces/whiterook.png" can-move class="piece" id="wr1">
        <img src="images/pieces/blackknight.png" can-move class="piece" id="bkn1">
        <img src="images/pieces/whiteknight.png" can-move class="piece" id="wkn1"> 
        <img src="images/pieces/whiteking.png" can-move class="piece" id="wk1"> 
        <img src="images/pieces/blackking.png" can-move class="piece" id="bk1"> 
        <img src="images/pieces/whitequeen.png" can-move class="piece" id="wq1"> 
        <img src="images/pieces/blackqueen.png" can-move class="piece" id="bq1">
        
        <img src="images/pieces/blackbishop.png" can-move class="piece" id="bb2">
        <img src="images/pieces/whitebishop.png" can-move class="piece" id="wb2">
        <img src="images/pieces/blackrook.png" can-move class="piece" id="br2">
        <img src="images/pieces/whiterook.png" can-move class="piece" id="wr2">
        <img src="images/pieces/blackknight.png" can-move class="piece" id="bkn2">
        <img src="images/pieces/whiteknight.png" can-move class="piece" id="wkn2"> 
        <img src="images/pieces/whitequeen.png" can-move class="piece" id="wq2"> 
        <img src="images/pieces/blackqueen.png" can-move class="piece" id="bq2">

        <img src="images/pieces/whitepawn.png" can-move class="piece" id="wp1">
        <img src="images/pieces/whitepawn.png" can-move class="piece" id="wp2">
        <img src="images/pieces/whitepawn.png" can-move class="piece" id="wp3">
        <img src="images/pieces/whitepawn.png" can-move class="piece" id="wp4">
        <img src="images/pieces/whitepawn.png" can-move class="piece" id="wp5">
        <img src="images/pieces/whitepawn.png" can-move class="piece" id="wp6">
        <img src="images/pieces/whitepawn.png" can-move class="piece" id="wp7">
        <img src="images/pieces/whitepawn.png" can-move class="piece" id="wp8">

        <img src="images/pieces/blackpawn.png" can-move class="piece" id="bp1">
        <img src="images/pieces/blackpawn.png" can-move class="piece" id="bp2">
        <img src="images/pieces/blackpawn.png" can-move class="piece" id="bp3">
        <img src="images/pieces/blackpawn.png" can-move class="piece" id="bp4">
        <img src="images/pieces/blackpawn.png" can-move class="piece" id="bp5">
        <img src="images/pieces/blackpawn.png" can-move class="piece" id="bp6">
        <img src="images/pieces/blackpawn.png" can-move class="piece" id="bp7">
        <img src="images/pieces/blackpawn.png" can-move class="piece" id="bp8">
      </div>
    </div>

    <img src="images/treeimage.png" id="tree" can-grow>
    <img src="images/bush.png" id="bushbush" class="bushb" can-grow>
    <img src="images/tree2.png" id="tree2" can-grow>
    <img src="images/bench.png" id="bench">

      <!--
      The body includes the content you see in the page
      Each element is defined using tags, like this <div></div>
      The attributes like class="wrapper" let us style elements in the CSS
    -->
    
  </body>
</html>
